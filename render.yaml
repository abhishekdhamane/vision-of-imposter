services:
  # ── Backend (FastAPI + WebSocket) ──────────────────────────────────────
  - type: web
    name: vision-of-imposter-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # ── Frontend (React / Vite static build) ───────────────────────────────
  - type: web
    name: vision-of-imposter-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false           # you'll set this after backend deploys
      - key: VITE_WS_URL
        sync: false           # you'll set this after backend deploys
